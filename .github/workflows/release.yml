name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if versionName changed
        id: check
        run: |
          FILE="app/build.gradle.kts"
          CURRENT=$(grep 'versionName =' "$FILE" | sed -E 's/.*versionName = "(.*)".*/\1/')
          PREVIOUS=$(git show HEAD~1:"$FILE" 2>/dev/null | grep 'versionName =' | sed -E 's/.*versionName = "(.*)".*/\1/' || echo "")

          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$CURRENT" ]; then
            echo "version_changed=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"      >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT"      >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Locate and Rename APK
        id: apk
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          ORIGINAL_APK=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          NEW_NAME="f1-android-$VERSION.apk"
          NEW_PATH="app/build/outputs/apk/release/$NEW_NAME"

          mv "$ORIGINAL_APK" "$NEW_PATH"

          echo "path=$NEW_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: F1 Android v${{ needs.check-version.outputs.version }}
          body: |
            Automated release for version `${{ needs.check-version.outputs.version }}`.
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
